<script>
window.state.role = 'patient'
window.state.user = patients[0]
window.bootShell('patient', patients[0])
window.navigate('patient-appts', { filter: 'history' })

setTimeout(function() {
  var mc = document.getElementById('main-content')
  mc.scrollTop = 400
  setTimeout(function() {
    var tabs = document.querySelector('#main-content .filter-tabs')
    var rect = tabs.getBoundingClientRect()
    var out = document.createElement('div')
    out.style.cssText = 'position:fixed;top:0;left:0;background:yellow;padding:8px;font-size:12px;z-index:999999'
    out.textContent = 'After scrollTop=400: tabs.getBoundingClientRect().top = ' + rect.top + ' (should be ~58, the topbar height, if pinned correctly; would be negative/way off-screen if NOT sticky)'
    document.body.prepend(out)
  }, 200)
}, 600)
</script>
